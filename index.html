<!DOCTYPE html>
<html>
<head>
    <title>Queen Fan Page</title>
    <style>
        /* CSS STYLES */
        body {
            background-color: #f5f5f5;
            font-family: sans-serif;
            margin: 20px;
        }

        /* Simple box for About Me */
        .about-section {
            background-color: white;
            padding: 20px;
            border: 1px solid #dddddd;
            margin-bottom: 30px;
        }

        .title-members {
            text-align: center;
        }

        /* Simple layout technique */
        .members-container {
            text-align: center;
        }

        /* Individual member cards stacked side-by-side */
        .member-box {
            display: inline-block;
            background-color: white;
            width: 200px;
            margin: 15px;
            padding: 15px;
            border: 1px solid #ccc;
            vertical-align: top;
        }

        .member-box img {
            width: 100%;
            height: 200px;
            object-fit: cover; /* Keeps image square */
        }

        .member-box button {
            background-color: #333;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
        }

        .member-box button:hover {
            background-color: red; /* Changes color when hovered */
        }
    </style>
</head>
<body>

    <!-- About Me Section -->
    <div class="about-section">
        <h1>About Me</h1>
        <p>Hi! I am a huge music fan and Queen is my favorite band of all time. I made this simple page to showcase the four legendary members and listen to their iconic sounds.</p>
    </div>

    <h2 class="title-members">The Members of Queen</h2>

    <!-- Members Container -->
    <div class="members-container">
        
        <!-- Freddie Mercury -->
        <div class="member-box">
            <img src="freddie.jpg" alt="Freddie Mercury">
            <h3>Freddie Mercury</h3>
            <button onclick="playSound('freddie-audio')">Play Sound</button>
            <audio id="freddie-audio" src="freddie.mp3"></audio>
        </div>

        <!-- Brian May -->
        <div class="member-box">
            <img src="brian.jpg" alt="Brian May">
            <h3>Brian May</h3>
            <button onclick="playSound('brian-audio')">Play Sound</button>
            <audio id="brian-audio" src="brian.mp3"></audio>
        </div>

        <!-- Roger Taylor -->
        <div class="member-box">
            <img src="roger.jpg" alt="Roger Taylor">
            <h3>Roger Taylor</h3>
            <button onclick="playSound('roger-audio')">Play Sound</button>
            <audio id="roger-audio" src="roger.mp3"></audio>
        </div>

        <!-- John Deacon -->
        <div class="member-box">
            <img src="john.jpg" alt="John Deacon">
            <h3>John Deacon</h3>
            <button onclick="playSound('john-audio')">Play Sound</button>
            <audio id="john-audio" src="john.mp3"></audio>
        </div>

    </div>

    <!-- JAVASCRIPT CODE -->
    <script>
        function playSound(id) {
            var sound = document.getElementById(id);
            sound.play();
        }
    </script>

</body>
</html>
