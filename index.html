<!DOCTYPE html>
<html>
<head>
  <title>DivaLovieSpirit</title>
  <style>
    body {
      background-color: black;
    }
    
    .Intro {
      color: white;
      font-family: Impact;
    }

    .IntroTwo {
      position: relative;
      text-align: center;
      color: white;
      font-family: 'Queen';
      font-size: 34px;
    }
  </style>
</head>
<body>
  <p class="Intro" id="text1"> D I V A D E N </p>
  <p class="IntroTwo" id="text2"> GREETINGS, SALUTATIONS </p>

  <script>
    // A list of vibrant colors to cycle through for the letters
    const colorPalette = ["#FF5733", "#33FF57", "#3357FF", "#F3FF33", "#FF33F3", "#33FFF0"];

    function colorizeText(elementId) {
      const element = document.getElementById(elementId);
      if (!element) return;

      const originalText = element.innerText;
      element.innerHTML = ""; // Clear the original plain text

      // Loop through each character to apply a color
      for (let i = 0; i < originalText.length; i++) {
        const charSpan = document.createElement("span");
        charSpan.innerText = originalText[i];

        // Only color actual letters, skip spaces to keep layout clean
        if (originalText[i] !== " ") {
          // Cycle through the color palette pattern smoothly
          charSpan.style.color = colorPalette[i % colorPalette.length];
        }

        element.appendChild(charSpan);
      }
    }

    // Run the function on both of your text sections
    colorizeText("text1");
    colorizeText("text2");
  </script>
</body>
</html>
