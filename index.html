<!DOCTYPE html>
<html>
<head>
  <title>DivaLovieSpirit</title>
<body>
  <!-- This is where the number displays on your screen -->
<h1 id="counter" style="font-size: 50px; font-family: sans-serif; text-align: center;">0</h1>

<script>
  // 1. Variable container starting at 0
  let count = 0;

  // 2. A timer that repeats every 1 second (1000ms)
  setInterval(function() {
    
    // 3. Increase the variable by 1
    count = count + 1;
    
    // 4. Update the screen text with the new number
    document.getElementById("counter").innerText = count;
    
    // 5. Log it to the hidden browser inspector console
    console.log("Current count:", count);
    
  }, 1000);
</script>
</body>
</head>
</html>
