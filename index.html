<!DOCTYPE html>
<html>
<head>
<title>Deacon Arena</title>
<style>
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  background: #111; color: #fff;
  font-family: monospace;
  overflow: hidden;
}
#gameUI {
  position: absolute;
  top: 10px; left: 10px;
  background: rgba(0,0,0,0.8);
  padding: 10px;
  border: 2px solid #ff0;
  z-index: 10;
  max-width: 250px;
}
#dialogue {
  position: absolute;
  bottom: 20px; left: 5%; right: 5%;
  background: rgba(20,20,20,0.95);
  border: 3px solid #0ff;
  padding: 10px; z-index: 10;
}
#canvas {
  display: block;
  width: 100vw; height: 100vh;
}
.btn {
  background: #ff0; color: #000;
  border: none; padding: 5px;
  font-weight: bold; cursor: pointer;
  display: none; margin-top: 5px;
}
</style>
</head>
<body>

<div id="gameUI">
  <b style="color:#ff0;">DEACON ARENA</b>
  <div id="stats">Loading...</div>
  <button id="rstBtn" class="btn" onclick="resetGame()">RESTART</button>
</div>

<div id="dialogue">
  <b style="color:#0ff;">Freddie:</b>
  <div id="dialogueText">Let's go, John! Fight!</div>
</div>

<canvas id="canvas"></canvas>

<script>
var canvas = document.getElementById("canvas");
var ctx = canvas.getContext("2d");
var loop, keys = {};
var roomX = 0, roomY = 0;
var pX, pY, pSize = 32, pSpeed = 6;
var hp = 100, maxHp = 100, atk = 10;
var lvl = 1, xp = 0, maxXp = 50, bossCount = 0;
var swing = false, swingTime = 0;
var fX, fY, fSize = 32, fSpeed = 5;
var fSwing = false, fSwingTime = 0, fAtkCooldown = 0;
var badGuys = [];

var johnImg = new Image();
johnImg.crossOrigin = "anonymous";
johnImg.src = "https://picsum.photos";

var freddieImg = new Image();
freddieImg.crossOrigin = "anonymous";
freddieImg.src = "https://picsum.photos";

function beep(f, type, d) {
  try {
    var ctxA = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctxA.createOscillator();
    var gain = ctxA.createGain();
    osc.type = type || "square";
    osc.frequency.setValueAtTime(f, ctxA.currentTime);
    gain.gain.setValueAtTime(0.03, ctxA.currentTime);
    osc.connect(gain); gain.connect(ctxA.destination);
    osc.start(); osc.stop(ctxA.currentTime + (d || 0.1));
  } catch(e) {}
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize); resize();

function resetGame() {
  hp = 100; maxHp = 100; atk = 10;
  lvl = 1; xp = 0; maxXp = 50; bossCount = 0;
  roomX = 0; roomY = 0;
  pX = canvas.width / 2; pY = canvas.height / 2;
  fX = pX - 50; fY = pY - 50;
  badGuys = []; swing = false; fSwing = false;
  document.getElementById("rstBtn").style.display = "none";
  document.getElementById("dialogueText").innerHTML = "Let's hunt phantoms!";
  beep(330, "triangle", 0.2);
  populateRoom();
  if(loop) clearInterval(loop);
  loop = setInterval(run, 1000 / 30);
}

function populateRoom() {
  badGuys = [];
  var isBoss = (Math.abs(roomX) + Math.abs(roomY)) % 2 === 0 && (roomX !== 0 || roomY !== 0);
  if (isBoss && bossCount < 100) {
    var bLvl = bossCount + 1;
    badGuys.push({
      x: canvas.width / 2, y: canvas.height / 3,
      size: 50, hp: 50 + (bLvl * 40), maxHp: 50 + (bLvl * 40),
      atk: 4 + bLvl, spd: 2, isBoss: true, label: "BOSS " + bLvl
    });
    document.getElementById("dialogueText").innerHTML = "Watch out, John! Boss ahead!";
    beep(150, "sawtooth", 0.4);
  } else {
    var count = 3 + Math.floor(Math.random() * 3);
    for (var i = 0; i < count; i++) {
      badGuys.push({
        x: Math.random() * (canvas.width - 100) + 50,
        y: Math.random() * (canvas.height - 100) + 50,
        size: 24, hp: 15 + (lvl * 5), maxHp: 15 + (lvl * 5),
        atk: 2 + lvl, spd: 2.5, isBoss: false, label: "Ghost"
      });
    }
  }
}

function run() { update(); draw(); }

function update() {
  if (hp <= 0) return;
  if (keys['w'] || keys['W']) pY -= pSpeed;
  if (keys['s'] || keys['S']) pY += pSpeed;
  if (keys['a'] || keys['A']) pX -= pSpeed;
  if (keys['d'] || keys['D']) pX += pSpeed;

  if (pX < -10) { roomX--; pX = canvas.width - 20; populateRoom(); fX = pX; }
  if (pX > canvas.width + 10) { roomX++; pX = 20; populateRoom(); fX = pX; }
  if (pY < -10) { roomY++; pY = canvas.height - 20; populateRoom(); fY = pY; }
  if (pY > canvas.height + 10) { roomY--; pY = 20; populateRoom(); fY = pY; }

  if (swing) { swingTime++; if (swingTime > 4) { swing = false; swingTime = 0; } }
  if (fSwing) { fSwingTime++; if (fSwingTime > 4) { fSwing = false; fSwingTime = 0; } }
  if (fAtkCooldown > 0) fAtkCooldown--;

  if (badGuys.length > 0) {
    var target = badGuys[0], minDist = 9999;
    for (var k = 0; k < badGuys.length; k++) {
      var dX = badGuys[k].x - fX, dY = badGuys[k].y - fY;
      var d = Math.sqrt(dX*dX + dY*dY);
      if (d < minDist) { minDist = d; target = badGuys[k]; }
    }
    if (fX < target.x) fX += fSpeed; if (fX > target.x) fX -= fSpeed;
    if (fY < target.y) fY += fSpeed; if (fY > target.y) fY -= fSpeed;
    if (minDist < 60 && fAtkCooldown === 0) { fSwing = true; fAtkCooldown = 12; beep(400, "sine", 0.04); }
  } else {
    var dX = pX - fX - 40, dY = pY - fY - 40;
    if (Math.sqrt(dX*dX + dY*dY) > 50) {
      if (fX < pX - 40) fX += fSpeed; if (fX > pX - 40) fX -= fSpeed;
      if (fY < pY - 40) fY += fSpeed; if (fY > pY - 40) fY -= fSpeed;
    }
  }

  for (var i = badGuys.length - 1; i >= 0; i--) {
    var e = badGuys[i];
    if (e.x < pX) e.x += e.spd; if (e.x > pX) e.x -= e.spd;
    if (e.y < pY) e.y += e.spd; if (e.y > pY) e.y -= e.spd;

    var hJ = swing && (e.x > pX - 60 && e.x < pX + 60 && e.y > pY - 60 && e.y < pY + 60);
    var hF = fSwing && (e.x > fX - 60 && e.x < fX + 60 && e.y > fY - 60 && e.y < fY + 60);
    if (hJ || hF) {
      e.hp -= atk; beep(600, "square", 0.02);
      if (e.hp <= 0) {
        if (e.isBoss) { bossCount++; xp += 100; beep(880, "sine", 0.3); } else { xp += 15; }
        badGuys.splice(i, 1); checkLvl(); continue;
      }
    }
    if (e.x > pX - e.size && e.x < pX + pSize && e.y > pY - e.size && e.y < pY + pSize) {
      hp -= e.atk * 0.04; if (Math.random() < 0.1) beep(120, "sawtooth", 0.04);
      if (hp <= 0) { hp = 0; clearInterval(loop); gameOver(); }
    }
  }
  document.getElementById("stats").innerHTML = "Lvl: " + lvl + " | Rm: " + roomX + "," + roomY + "<br>HP: " + Math.ceil(hp) + " / " + maxHp + "<br>XP: " + xp + " / " + maxXp + "<br>Bosses: " + bossCount + " / 100";
}

function checkLvl() {
  if (xp >= maxXp) {
    xp -= maxXp; lvl++; maxXp = Math.floor(maxXp * 1.5);
    maxHp += 20; hp = maxHp; atk += 6; beep(523, "triangle", 0.2);
  }
}

function draw() {
  ctx.fillStyle = "#1e1e1e"; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "#2a2a2a";
  for(var g = 0; g < canvas.width; g += 40) { ctx.beginPath(); ctx.moveTo(g, 0); ctx.lineTo(g, canvas.height); ctx.stroke(); }
  for(var g = 0; g < canvas.height; g += 40) { ctx.beginPath(); ctx.moveTo(0, g); ctx.lineTo(canvas.width, g); ctx.stroke(); }

  ctx.fillStyle = "#0f0"; ctx.fillRect(pX, pY, pSize, pSize);
  try { ctx.drawImage(johnImg, pX, pY, pSize, pSize); } catch(e) {}
  if (swing) { ctx.fillStyle = "rgba(0,255,255,0.4)"; ctx.fillRect(pX-15, pY-15, pSize+30, pSize+30); }

  ctx.fillStyle = "#ff0"; ctx.fillRect(fX, fY, fSize, fSize);
  try { ctx.drawImage(freddieImg, fX, fY, fSize, fSize); } catch(e) {}
  if (fSwing) { ctx.fillStyle = "rgba(255,0,255,0.4)"; ctx.fillRect(fX-15, fY-15, fSize+30, fSize+30); }

  for (var i = 0; i < badGuys.length; i++) {
    var e = badGuys[i]; ctx.fillStyle = e.isBoss ? "#f0f" : "#f33"; ctx.fillRect(e.x, e.y, e.size, e.size);
    ctx.fillStyle = "red"; ctx.fillRect(e.x, e.y - 10, e.size, 4);
    ctx.fillStyle = "green"; ctx.fillRect(e.x, e.y - 10, e.size * (e.hp / e.maxHp), 4);
  }
}

function gameOver() {
  ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "red"; ctx.font = "30px monospace"; ctx.fillText("GAME OVER", canvas.width / 2 - 70, canvas.height / 2);
  document.getElementById("rstBtn").style.display = "block";
}

window.addEventListener("keydown", function(e) {
  keys[e.key] = true;
  if (e.code === "Space") {
    e.preventDefault(); if (!swing && hp > 0) { swing = true; swingTime = 0; beep(350, "sine", 0.04); }
  }
});
window.addEventListener("keyup", function(e) { keys[e.key] = false; });
resetGame();
</script>
</body>
</html>
