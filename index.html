<!DOCTYPE html>
<html>
<head>
    <title>Queen Free Roam</title>
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: monospace;
            text-align: center;
            margin: 10px;
        }
        .box {
            max-width: 500px;
            margin: 0 auto;
            background: #262626;
            padding: 15px;
            border: 3px solid #ff0;
        }
        h1, h2 {
            color: #ff0;
            margin: 5px;
        }
        #arena {
            background: #000;
            border: 3px solid #fff;
            display: block;
            margin: 15px auto;
        }
        .info {
            background: #333;
            padding: 8px;
            font-size: 11px;
            border: 1px solid #fff;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Deacon Free-Roam</h1>
    <p>Explore the arena and fight!</p>
    
    <canvas 
        id="arena" 
        width="400" 
        height="300">
    </canvas>
    
    <div class="info">
        <p><b>MOVE:</b> W, A, S, D keys</p>
        <p><b>ATTACK:</b> Spacebar</p>
        <h3 id="statBox">
            Score: 0 | HP: 5
        </h3>
    </div>
</div>

<script>
    var cnvs = document.getElementById("arena");
    var ctx = cnvs.getContext("2d");
    var loop;
    
    // Game States
    var score = 0;
    var hp = 5;
    
    // Player Setup
    var pX = 180;
    var pY = 130;
    var pSpd = 4;
    var atkActive = false;
    var atkTimer = 0;
    
    // Keyboard State Array
    var keys = {};
    
    // Enemy List Array
    var badGuys = [];

    // Verified Safe Art Links
    var imgJohn = new Image();
    imgJohn.crossOrigin = "anonymous";
    imgJohn.src = "https://picsum.photos";

    var imgGhost = new Image();
    imgGhost.crossOrigin = "anonymous";
    imgGhost.src = "https://picsum.photos";

    // Start Everything Clean
    function start() {
        score = 0;
        hp = 5;
        badGuys = [];
        atkActive = false;
        
        if(loop) clearInterval(loop);
        loop = setInterval(tick, 1000 / 30);
    }

    function tick() {
        updateGame();
        drawGame();
    }

    function updateGame() {
        // Player Movement Engine
        if (keys['w'] || keys['W']) pY -= pSpd;
        if (keys['s'] || keys['S']) pY += pSpd;
        if (keys['a'] || keys['A']) pX -= pSpd;
        if (keys['d'] || keys['D']) pX += pSpd;

        // Keep Player Inside Walls
        if (pX < 0) pX = 0;
        if (pX > cnvs.width - 30) {
            pX = cnvs.width - 30;
        }
        if (pY < 0) pY = 0;
        if (pY > cnvs.height - 30) {
            pY = cnvs.height - 30;
        }

        // Handle Sword Swipe Timing
        if (atkActive) {
            atkTimer++;
            if (atkTimer > 4) {
                atkActive = false;
                atkTimer = 0;
            }
        }

        // Spawn Enemies Slowly
        if (Math.random() < 0.02 && badGuys.length < 5) {
            badGuys.push({
                x: Math.random() * (cnvs.width - 30),
                y: Math.random() * (cnvs.height - 30),
                spd: 1.5
            });
        }

        // Process Enemies AI
        for (var i = badGuys.length - 1; i >= 0; i--) {
            var e = badGuys[i];

            // AI Hunts Player Tracking Position
            if (e.x < pX) e.x += e.spd;
            if (e.x > pX) e.x -= e.spd;
            if (e.y < pY) e.y += e.spd;
            if (e.y > pY) e.y -= e.spd;

            // Combat Collision Checks
            var hit = false;
            
            if (atkActive) {
                // Check if enemy inside weapon arc
                if (e.x > pX - 25 && e.x < pX + 55 &&
                    e.y > pY - 25 && e.y < pY + 55) {
                    badGuys.splice(i, 1);
                    score++;
                    hit = true;
                }
            }

            // Enemy Hits Player Check
            if (!hit) {
                if (e.x > pX - 20 && e.x < pX + 20 &&
                    e.y > pY - 20 && e.y < pY + 20) {
                    badGuys.splice(i, 1);
                    hp--;
                    if (hp <= 0) {
                        clearInterval(loop);
                        endGameScreen();
                    }
                }
            }
        }

        // Update UI Box Text String Safely
        var txt = "Score: " + score + " | HP: " + hp;
        document.getElementById("statBox").innerHTML = txt;
    }

    function drawGame() {
        // Refresh Screen Canvas Backdrop
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, cnvs.width, cnvs.height);

        // Draw Player Sprite Box Look
        ctx.fillStyle = "#0f0";
        ctx.fillRect(pX, pY, 30, 30);
        try {
            ctx.drawImage(imgJohn, pX, pY, 30, 30);
        } catch(err) {}

        // Draw Energy Sword Arc Effect
        if (atkActive) {
            ctx.fillStyle = "#0ff";
            ctx.fillRect(pX - 15, pY - 15, 60, 60);
        }

        // Draw Enemy Grid Sprites Dynamic
        for (var i = 0; i < badGuys.length; i++) {
            var e = badGuys[i];
            ctx.fillStyle = "#f00";
            ctx.fillRect(e.x, e.y, 30, 30);
            try {
                ctx.drawImage(imgGhost, e.x, e.y, 30, 30);
            } catch(err) {}
        }
    }

    function endGameScreen() {
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(0, 0, cnvs.width, cnvs.height);
        ctx.fillStyle = "red";
        ctx.font = "24px monospace";
        ctx.fillText("GAME OVER", 130, 140);
    }

    // Capture Input Up and Down States
    window.addEventListener("keydown", function(e) {
        keys[e.key] = true;
        if (e.code === "Space") {
            e.preventDefault();
            if (!atkActive && hp > 0) {
                atkActive = true;
                atkTimer = 0;
            }
        }
    });

    window.addEventListener("keyup", function(e) {
        keys[e.key] = false;
    });

    // Fire Up Engine Load
    start();
</script>

</body>
</html>
